  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

vw, 132px); }\n    h2 { font-size: clamp(40px, 5vw, 72px); letter-spacing: -1.5px; }\n    h3 { font-size: 28px; letter-spacing: -0.5px; }\n    h4 { font-size: 18px; letter-spacing: 0; font-weight: 700; }\n\n    .eyebrow {\n      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;\n      font-weight: 700; color: var(--muted); margin-bottom: 16px;\n      display: flex; align-items: center; gap: 12px;\n    }\n    .dark .eyebrow { color: var(--muted-dark); }\n    .eyebrow::before {\n      content: \"\"; display: block; width: 28px; height: 2px;\n      background: var(--teal);\n    }\n    .lede { font-size: 22px; line-height: 1.4; max-width: 720px; font-weight: 500; color: var(--ink); }\n    .dark .lede { color: var(--paper); }\n    p { margin: 0 0 18px; max-width: 680px; color: var(--ink); }\n    .dark p { color: #d6dde6; }\n    .small { font-size: 13px; color: var(--muted); }\n    .dark .small { color: var(--muted-dark); }\n    .mono { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; font-weight: 500; letter-spacing: 0.5px; }\n\n    .section-label {\n      position: absolute; top: 32px; left: 64px;\n      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;\n      font-weight: 700; color: var(--muted);\n      display: flex; gap: 16px; align-items: center;\n    }\n    .dark .section-label { color: var(--muted-dark); }\n    .section-label .num {\n      width: 28px; height: 28px; border-radius: 50%;\n      background: var(--ink); color: var(--paper);\n      display: inline-flex; align-items: center; justify-content: center;\n      font-size: 12px; font-weight: 700; letter-spacing: 0;\n    }\n    .dark .section-label .num { background: var(--teal); color: var(--ink); }\n\n    /* ============ COVER ============ */\n    .cover {\n      min-height: 100vh;\n      background: var(--ink);\n      color: var(--paper);\n      display: flex; flex-direction: column;\n      padding: 64px;\n      position: relative; overflow: hidden;\n    }\n    .cover::before {\n      content: \"\"; position: absolute; right: -10%; top: -20%;\n      width: 70%; height: 140%;\n      background: radial-gradient(closest-side, rgba(94,231,214,0.16), rgba(21,184,174,0.05) 50%, transparent 75%);\n      filter: blur(8px);\n    }\n    .cover-top {\n      display: flex; justify-content: space-between; align-items: flex-start;\n      position: relative; z-index: 1;\n    }\n    .cover-brand {\n      font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700;\n      color: var(--teal);\n    }\n    .cover-meta {\n      text-align: right; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;\n      color: var(--muted-dark); font-weight: 600;\n      line-height: 1.8;\n    }\n    .cover-center {\n      flex: 1; display: flex; flex-direction: column; justify-content: center;\n      position: relative; z-index: 1; max-width: 900px;\n    }\n    .cover h1 { line-height: 0.9; margin-bottom: 32px; }\n    .cover h1 .gradient {\n      background: linear-gradient(120deg, var(--teal-light), var(--teal) 55%, var(--teal-deep));\n      -webkit-background-clip: text; background-clip: text; color: transparent;\n      font-style: italic;\n    }\n    .cover-tag { font-size: 32px; font-weight: 500; color: #d6dde6; line-height: 1.3; max-width: 720px; }\n    .cover-bottom {\n      display: flex; justify-content: space-between; align-items: flex-end;\n      position: relative; z-index: 1;\n      padding-top: 48px;\n      border-top: 1px solid var(--line-dark);\n    }\n    .cover-bottom .label {\n      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;\n      color: var(--muted-dark); font-weight: 700; margin-bottom: 4px;\n    }\n    .cover-bottom .value {\n      font-size: 14px; color: var(--paper); font-weight: 600;\n    }\n    .toc { display: flex; gap: 48px; }\n    .toc ol { list-style: none; padding: 0; margin: 0; counter-reset: t; }\n    .toc li {\n      counter-increment: t;\n      font-size: 13px; color: #d6dde6;\n      padding: 4px 0;\n    }\n    .toc li::before {\n      content: counter(t, decimal-leading-zero) \"  \";\n      color: var(--teal); font-weight: 700;\n    }\n\n    /* ============ LOGO PAGE ============ */\n    .logo-hero {\n      background: var(--ink);\n      border-radius: 20px;\n      padding: 80px 48px;\n      display: flex; align-items: center; justify-content: center;\n      margin-bottom: 32px;\n      min-height: 280px;\n    }\n    .logo-hero img { max-width: 60%; height: auto; max-height: 200px; }\n\n    .variants-grid {\n      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;\n      margin-top: 32px;\n    }\n    .vcard {\n      background: var(--ink); border-radius: 14px;\n      padding: 48px 32px; min-height: 180px;\n      display: flex; flex-direction: column; align-items: center; justify-content: center;\n      position: relative;\n    }\n    .vcard img { max-width: 80%; max-height: 110px; height: auto; }\n    .vcard .vname {\n      position: absolute; top: 14px; left: 18px;\n      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;\n      color: var(--muted-dark); font-weight: 700;\n    }\n\n    /* ============ CLEARSPACE ============ */\n    .clearspace {\n      display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px;\n      align-items: center;\n    }\n    .clearspace-vis {\n      background: var(--paper-2);\n      border-radius: 14px;\n      padding: 48px;\n      display: flex; justify-content: center; align-items: center;\n      position: relative;\n    }\n    .cs-frame {\n      position: relative;\n      padding: 56px;\n    }\n    .cs-frame::before {\n      content: \"\"; position: absolute; inset: 0;\n      border: 1.5px dashed rgba(21,184,174,0.5);\n      border-radius: 6px;\n    }\n    .cs-frame img { display: block; max-width: 100%; height: auto; max-height: 120px; }\n    /* X marks at corners */\n    .cs-x {\n      position: absolute;\n      width: 24px; height: 24px;\n      background: var(--teal);\n      color: var(--ink);\n      display: flex; align-items: center; justify-content: center;\n      font-weight: 900; font-size: 14px;\n      border-radius: 4px;\n    }\n    .cs-x.tl { top: -12px; left: -12px; }\n    .cs-x.tr { top: -12px; right: -12px; }\n    .cs-x.bl { bottom: -12px; left: -12px; }\n    .cs-x.br { bottom: -12px; right: -12px; }\n    .rule {\n      font-size: 14px; color: var(--ink); line-height: 1.6;\n      max-width: 380px;\n    }\n    .rule .x-inline {\n      display: inline-flex; align-items: center; justify-content: center;\n      width: 18px; height: 18px; background: var(--teal); color: var(--ink);\n      font-weight: 900; font-size: 11px; border-radius: 3px;\n      vertical-align: -3px; margin: 0 4px;\n    }\n\n    /* ============ MIN SIZE ============ */\n    .minsize {\n      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;\n      margin-top: 24px;\n    }\n    .ms-card {\n      background: var(--paper-2);\n      border-radius: 12px; padding: 32px 24px;\n      display: flex; flex-direction: column; align-items: center;\n      gap: 16px;\n    }\n    .ms-card .ms-vis {\n      display: flex; align-items: flex-end; justify-content: center;\n      width: 100%; min-height: 100px;\n    }\n    .ms-card img { display: block; }\n    .ms-meta {\n      text-align: center; font-size: 11px; color: var(--muted);\n      letter-spacing: 2px; text-transform: uppercase; font-weight: 700;\n    }\n    .ms-meta strong { display: block; color: var(--ink); font-size: 22px; letter-spacing: -0.5px; text-transform: none; font-weight: 900; margin-bottom: 4px; }\n\n    /* ============ MISUSE ============ */\n    .misuse {\n      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\n      margin-top: 24px;\n    }\n    .mu-card {\n      background: #fff;\n      border: 1px solid var(--line);\n      border-radius: 12px;\n      padding: 48px 32px 20px;\n      min-height: 200px;\n      display: flex; flex-direction: column; align-items: center; justify-content: space-between;\n      position: relative; overflow: hidden;\n    }\n    .mu-card .stamp {\n      position: absolute; top: 14px; right: 14px;\n      width: 26px; height: 26px;\n      background: #e23a2e; color: white;\n      border-radius: 50%;\n      display: flex; align-items: center; justify-content: center;\n      font-weight: 900; font-size: 16px;\n    }\n    .mu-card img, .mu-card .mu-vis {\n      max-width: 90%; max-height: 80px; height: auto; display: block; margin-bottom: 24px;\n    }\n    .mu-card .label {\n      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;\n      color: var(--muted); font-weight: 700; text-align: center;\n    }\n    /* misuse visualizations */\n    .mu-stretch { transform: scaleX(1.6) scaleY(0.8); }\n    .mu-rotate { transform: rotate(-12deg); }\n    .mu-recolor { filter: hue-rotate(120deg) saturate(0.6); }\n    .mu-shadow { filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.45)); }\n    .mu-outline { filter: invert(1) brightness(0.4); }\n    .mu-on-busy {\n      background-image: repeating-linear-gradient(45deg, #d97757 0, #d97757 8px, #e2916b 8px, #e2916b 16px);\n    }\n\n    /* ============ COLOR ============ */\n    .color-hero {\n      background: linear-gradient(120deg, var(--teal-light) 0%, var(--teal) 55%, var(--teal-deep) 100%);\n      border-radius: 16px;\n      height: 200px;\n      margin-bottom: 24px;\n      position: relative;\n      overflow: hidden;\n    }\n    .color-hero::after {\n      content: \"120° · 3 stops\";\n      position: absolute; bottom: 18px; right: 22px;\n      font-family: ui-monospace, Menlo, monospace;\n      font-size: 11px; color: rgba(7,14,20,0.6);\n      letter-spacing: 1px; font-weight: 600;\n    }\n    .swatches {\n      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\n    }\n    .swatch {\n      border-radius: 12px; overflow: hidden;\n      border: 1px solid var(--line);\n      background: #fff;\n    }\n    .swatch .chip {\n      height: 140px;\n      position: relative;\n    }\n    .swatch .chip::after {\n      content: attr(data-name);\n      position: absolute; top: 14px; left: 16px;\n      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;\n      font-weight: 700; color: rgba(7,14,20,0.5);\n    }\n    .swatch.dark-chip .chip::after { color: rgba(255,255,255,0.6); }\n    .swatch .info { padding: 18px 18px 22px; }\n    .swatch .hex {\n      font-family: ui-monospace, Menlo, monospace;\n      font-size: 16px; font-weight: 600; color: var(--ink);\n      margin-bottom: 12px; letter-spacing: 0.5px;\n    }\n    .swatch .vals {\n      font-family: ui-monospace, Menlo, monospace;\n      font-size: 11px; color: var(--muted); line-height: 1.7;\n    }\n\n    /* ============ TYPOGRAPHY ============ */\n    .type-display {\n      font-size: clamp(120px, 16vw, 220px);\n      font-weight: 900; font-style: italic;\n      line-height: 0.9; letter-spacing: -4px;\n      background: linear-gradient(120deg, var(--teal-light), var(--teal) 55%, var(--teal-deep));\n      -webkit-background-clip: text; background-clip: text; color: transparent;\n      margin: 24px 0 48px;\n    }\n    .type-grid {\n      display: grid; grid-template-columns: 1fr 1fr; gap: 32px;\n    }\n    .type-card {\n      background: var(--paper-2); border-radius: 14px;\n      padding: 36px;\n    }\n    .type-card .sample {\n      font-size: 64px; line-height: 1; letter-spacing: -1.5px;\n      margin-bottom: 32px; color: var(--ink);\n    }\n    .type-card.display .sample { font-weight: 900; font-style: italic; }\n    .type-card.body .sample { font-weight: 600; }\n    .type-card .specs {\n      display: flex; justify-content: space-between;\n      padding-top: 20px; border-top: 1px solid var(--line);\n      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;\n      color: var(--muted); font-weight: 700;\n    }\n    .type-card .specs strong { color: var(--ink); font-weight: 900; }\n    .type-scale {\n      margin-top: 32px;\n      background: var(--ink); color: var(--paper);\n      border-radius: 14px; padding: 40px;\n    }\n    .scale-row {\n      display: grid; grid-template-columns: 80px 1fr 100px;\n      gap: 24px; align-items: baseline;\n      padding: 18px 0;\n      border-bottom: 1px solid var(--line-dark);\n    }\n    .scale-row:last-child { border-bottom: none; }\n    .scale-row .sz {\n      font-family: ui-monospace, Menlo, monospace;\n      font-size: 11px; color: var(--muted-dark); letter-spacing: 1px;\n    }\n    .scale-row .scl-sample { line-height: 1; }\n    .scale-row .use {\n      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;\n      color: var(--muted-dark); font-weight: 700;\n    }\n\n    /* ============ APPLICATIONS ============ */\n    .apps {\n      display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 20px;\n      margin-top: 32px;\n    }\n    .app {\n      border-radius: 16px; overflow: hidden;\n      min-height: 320px; padding: 32px;\n      display: flex; flex-direction: column; justify-content: space-between;\n      position: relative;\n    }\n    .app .alabel {\n      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;\n      font-weight: 700;\n    }\n\n    /* Business card */\n    .app.card {\n      background: var(--ink);\n      grid-row: span 2;\n      padding: 0;\n      display: flex; align-items: center; justify-content: center;\n    }\n    .biz {\n      width: 80%; aspect-ratio: 1.75 / 1;\n      background: var(--paper);\n      border-radius: 6px;\n      padding: 28px;\n      display: flex; flex-direction: column; justify-content: space-between;\n      box-shadow: 0 30px 60px rgba(0,0,0,0.4);\n    }\n    .biz img { width: 60%; }\n    .biz .name { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; }\n    .biz .role { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 16px; }\n    .biz .contact { font-size: 11px; color: var(--ink); line-height: 1.7; font-family: ui-monospace, Menlo, monospace; }\n\n    /* Avatar */\n    .app.avatar {\n      background: linear-gradient(120deg, var(--teal-light), var(--teal) 55%, var(--teal-deep));\n      display: flex; flex-direction: column; align-items: center; justify-content: center;\n      gap: 18px;\n    }\n    .avatar-circle {\n      width: 140px; height: 140px;\n      background: var(--ink);\n      border-radius: 50%;\n      display: flex; align-items: center; justify-content: center;\n    }\n    .avatar-circle img { width: 50%; }\n    .app.avatar .alabel { color: rgba(7,14,20,0.7); }\n\n    /* Apparel / tag */\n    .app.tag {\n      background: var(--paper-2);\n    }\n    .app.tag .alabel { color: var(--muted); align-self: flex-start; }\n    .app.tag .tag-art {\n      flex: 1; display: flex; align-items: center; justify-content: center;\n    }\n    .app.tag img { max-width: 70%; max-height: 80px; }\n\n    /* Social */\n    .app.social { background: var(--ink); }\n    .app.social .alabel { color: var(--muted-dark); }\n    .app.social .social-art {\n      flex: 1; display: flex; align-items: center; justify-content: center;\n    }\n    .app.social img { max-width: 75%; }\n\n    /* ============ FOOTER ============ */\n    .footer {\n      background: var(--ink); color: var(--paper);\n      padding: 64px;\n      display: flex; justify-content: space-between; align-items: flex-end;\n    }\n    .footer h2 {\n      font-style: italic;\n      background: linear-gradient(120deg, var(--teal-light), var(--teal) 55%, var(--teal-deep));\n      -webkit-background-clip: text; background-clip: text; color: transparent;\n    }\n    .footer .small { color: var(--muted-dark); }\n\n    .powered {\n      display: inline-flex; align-items: center; gap: 18px;\n      margin-top: 32px; padding: 18px 24px 18px 22px;\n      background: rgba(255,255,255,0.04);\n      border: 1px solid var(--line-dark);\n      border-radius: 14px;\n      text-decoration: none;\n      transition: background 0.2s, border-color 0.2s, transform 0.2s;\n    }\n    .powered:hover {\n      background: rgba(94,231,214,0.10);\n      border-color: rgba(94,231,214,0.35);\n      transform: translateY(-2px);\n    }\n    .powered-label {\n      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;\n      font-weight: 700; color: var(--muted-dark);\n    }\n    .powered img {\n      height: 44px; width: auto; display: block;\n      background: #fff; padding: 6px 10px; border-radius: 6px;\n    }\n\n    @media print {\n      body { background: var(--paper); }\n      .page, .cover, .footer { page-break-after: always; break-after: page; padding: 48px 40px; }\n      .cover { min-height: auto; }\n      .page { border-bottom: none; }\n      h1 { font-size: 96px; }\n      h2 { font-size: 48px; }\n      .logo-hero { padding: 48px; }\n      .section-label { position: static; margin-bottom: 24px; }\n      .variants-grid, .misuse, .swatches { page-break-inside: avoid; }\n      a[href]::after { content: \"\"; }\n    }\n    @media (max-width: 880px) {\n      .page { padding: 64px 24px; }\n      .footer { padding: 48px 24px; flex-direction: column; gap: 32px; align-items: flex-start; }\n      .variants-grid, .misuse, .swatches { grid-template-columns: 1fr 1fr; }\n      .minsize { grid-template-columns: 1fr; }\n      .clearspace, .type-grid { grid-template-columns: 1fr; }\n      .apps { grid-template-columns: 1fr; }\n      .app.card { grid-row: auto; }\n      .cover-top, .cover-bottom { flex-direction: column; gap: 24px; }\n      .toc { flex-direction: column; gap: 24px; }\n      .section-label { position: static; margin-bottom: 32px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  \n\n  <!-- ========== COVER ========== -->\n  <section class=\"cover\">\n    <div class=\"cover-top\">\n      <div class=\"cover-brand\">Arctivate · Visual Identity<\u002Fdiv>\n      <div class=\"cover-meta\">\n        <a href=\"https://www.arcfitnessaustralia.com.au/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:inherit;margin-bottom:14px;\">\n          <span style=\"font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--muted-dark);\">Powered by<\u002Fspan>\n          <img src=\"49d15e25-f825-4d85-b577-e47af68d8838\" alt=\"ARC fitness\" style=\"height:36px;width:auto;background:#fff;padding:4px 8px;border-radius:5px;display:block;\">\n        <\u002Fa><br>\n        Volume 01 · 2026<br>\n        Brand Guidelines\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover-center\">\n      <h1><span class=\"gradient\">Arctivate<\u002Fspan><\u002Fh1>\n      <div class=\"cover-tag\">The marks, colors, and rules that keep our identity sharp.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover-bottom\">\n      <div class=\"toc\">\n        <div>\n          <ol>\n            <li>The Logo<\u002Fli>\n            <li>Clearspace<\u002Fli>\n            <li>Minimum Size<\u002Fli>\n            <li>Misuse<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n        <div>\n          <ol style=\"counter-reset: t 4;\">\n            <li>Color<\u002Fli>\n            <li>Typography<\u002Fli>\n            <li>Applications<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"label\">Issue<\u002Fdiv>\n        <div class=\"value\">v1.0<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 01 — THE LOGO ========== -->\n  <section class=\"page\">\n    <div class=\"section-label\"><span class=\"num\">01<\u002Fspan><span>The Logo<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Primary Lockup<\u002Fdiv>\n      <h2>Bolt &amp; wordmark.<\u002Fh2>\n      <p style=\"margin-top:24px;\">The Arctivate identity pairs an italic, gradient-filled wordmark with a forward-leaning lightning bolt. The bolt mirrors the italic slant of the type — together they read as motion, energy, and activation.<\u002Fp>\n\n      <div class=\"logo-hero\">\n        <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"Arctivate horizontal lockup\">\n      <\u002Fdiv>\n\n      <div class=\"eyebrow\" style=\"margin-top:48px;\">Variants<\u002Fdiv>\n      <p>Use the horizontal lockup as the default. Switch to stacked, wordmark, or mark when space, scale, or context demand it.<\u002Fp>\n\n      <div class=\"variants-grid\">\n        <div class=\"vcard\">\n          <div class=\"vname\">Horizontal<\u002Fdiv>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"Horizontal\">\n        <\u002Fdiv>\n        <div class=\"vcard\">\n          <div class=\"vname\">Stacked<\u002Fdiv>\n          <img src=\"ab26b520-e474-444e-8628-83127b3c709e\" alt=\"Stacked\">\n        <\u002Fdiv>\n        <div class=\"vcard\">\n          <div class=\"vname\">Wordmark<\u002Fdiv>\n          <img src=\"ac9d5dd6-fcc4-4639-b0fd-4aba7ed5bf80\" alt=\"Wordmark\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-top:20px;\">\n        <div class=\"vcard\">\n          <div class=\"vname\">Mark<\u002Fdiv>\n          <img src=\"3185d2be-39a5-4548-b73a-c2e7930bd107\" alt=\"Mark\" style=\"max-height:160px;\">\n        <\u002Fdiv>\n        <div class=\"vcard\" style=\"align-items:flex-start;justify-content:flex-start;padding:32px;\">\n          <div class=\"vname\">When to use what<\u002Fdiv>\n          <div style=\"color:#d6dde6;font-size:14px;line-height:1.7;margin-top:24px;max-width:480px;\">\n            <strong style=\"color:#fff;display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;\">Horizontal<\u002Fstrong>Default for nav, headers, presentations, and signage. Most legible at small scale.<br><br>\n            <strong style=\"color:#fff;display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;\">Stacked<\u002Fstrong>Square or near-square spaces — posters, gridded layouts, packaging panels.<br><br>\n            <strong style=\"color:#fff;display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;\">Wordmark<\u002Fstrong>When the mark is shown nearby or context makes the bolt redundant.<br><br>\n            <strong style=\"color:#fff;display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;\">Mark<\u002Fstrong>Avatars, favicons, app icons, and any tight square crop.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 02 — CLEARSPACE ========== -->\n  <section class=\"page cream\">\n    <div class=\"section-label\"><span class=\"num\">02<\u002Fspan><span>Clearspace<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Breathing room<\u002Fdiv>\n      <h2>Give the bolt room to strike.<\u002Fh2>\n      <p style=\"margin-top:24px;\">Keep a minimum clearspace equal to the width of the bolt around the entire logo. Nothing — type, imagery, edges of the page — should enter that zone.<\u002Fp>\n\n      <div class=\"clearspace\" style=\"margin-top:48px;\">\n        <div class=\"clearspace-vis\">\n          <div class=\"cs-frame\">\n            <span class=\"cs-x tl\">X<\u002Fspan><span class=\"cs-x tr\">X<\u002Fspan>\n            <span class=\"cs-x bl\">X<\u002Fspan><span class=\"cs-x br\">X<\u002Fspan>\n            <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"Horizontal with clearspace\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rule\">\n          <h4 style=\"margin-bottom:14px;\">The X rule<\u002Fh4>\n          <p>The minimum clearspace, <span class=\"x-inline\">X<\u002Fspan>, equals the width of the bolt in the lockup. Multiply it for tighter brand expressions — keep it minimum for cramped UI.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 03 — MIN SIZE ========== -->\n  <section class=\"page\">\n    <div class=\"section-label\"><span class=\"num\">03<\u002Fspan><span>Minimum Size<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Legibility floor<\u002Fdiv>\n      <h2>Don't crush it.<\u002Fh2>\n      <p style=\"margin-top:24px;\">Below these sizes the gradient muddies and the bolt loses its bite. If you need to go smaller, switch to the mark.<\u002Fp>\n\n      <div class=\"minsize\">\n        <div class=\"ms-card\">\n          <div class=\"ms-vis\"><img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" style=\"height:32px;width:auto;\" alt=\"Min horizontal\"><\u002Fdiv>\n          <div class=\"ms-meta\"><strong>120 px<\u002Fstrong>Horizontal · digital<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ms-card\">\n          <div class=\"ms-vis\"><img src=\"ab26b520-e474-444e-8628-83127b3c709e\" style=\"height:64px;width:auto;\" alt=\"Min stacked\"><\u002Fdiv>\n          <div class=\"ms-meta\"><strong>72 px<\u002Fstrong>Stacked · digital<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ms-card\">\n          <div class=\"ms-vis\"><img src=\"3185d2be-39a5-4548-b73a-c2e7930bd107\" style=\"height:48px;width:auto;\" alt=\"Min mark\"><\u002Fdiv>\n          <div class=\"ms-meta\"><strong>24 px<\u002Fstrong>Mark · favicon &amp; icons<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 04 — MISUSE ========== -->\n  <section class=\"page cream\">\n    <div class=\"section-label\"><span class=\"num\">04<\u002Fspan><span>Misuse<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Don'ts<\u002Fdiv>\n      <h2>Hands off the bolt.<\u002Fh2>\n      <p style=\"margin-top:24px;\">The logo ships as a fixed system. Don't stretch, rotate, recolor, outline, drop-shadow, or set it on visually noisy backgrounds.<\u002Fp>\n\n      <div class=\"misuse\">\n        <div class=\"mu-card\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" class=\"mu-stretch\" alt=\"Stretched\">\n          <div class=\"label\">Don't stretch<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mu-card\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" class=\"mu-rotate\" alt=\"Rotated\">\n          <div class=\"label\">Don't rotate<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mu-card\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" class=\"mu-recolor\" alt=\"Recolored\">\n          <div class=\"label\">Don't recolor<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mu-card\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" class=\"mu-shadow\" alt=\"Shadowed\">\n          <div class=\"label\">Don't add effects<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mu-card\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" class=\"mu-outline\" alt=\"Outlined\">\n          <div class=\"label\">Don't outline or invert<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mu-card mu-on-busy\">\n          <span class=\"stamp\">✕<\u002Fspan>\n          <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"On busy bg\" style=\"background:transparent;\">\n          <div class=\"label\" style=\"color:var(--ink);\">Don't place on noisy art<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 05 — COLOR ========== -->\n  <section class=\"page\">\n    <div class=\"section-label\"><span class=\"num\">05<\u002Fspan><span>Color<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Palette<\u002Fdiv>\n      <h2>Teal across three steps.<\u002Fh2>\n      <p style=\"margin-top:24px;\">The gradient runs 120° from <span class=\"mono\">#5EE7D6<\u002Fspan> → <span class=\"mono\">#15B8AE<\u002Fspan> at 55% → <span class=\"mono\">#0E8F88<\u002Fspan>. Always preserve all three stops. The ink is reserved for backgrounds and the wordmark in single-color treatments.<\u002Fp>\n\n      <div class=\"color-hero\" style=\"margin-top:32px;\"><\u002Fdiv>\n\n      <div class=\"swatches\">\n        <div class=\"swatch\">\n          <div class=\"chip\" style=\"background:#5EE7D6\" data-name=\"Teal · Light\"><\u002Fdiv>\n          <div class=\"info\">\n            <div class=\"hex\">#5EE7D6<\u002Fdiv>\n            <div class=\"vals\">\n              RGB · 94 231 214<br>\n              CMYK · 56 0 24 0<br>\n              HSL · 172 73% 64%\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"swatch\">\n          <div class=\"chip\" style=\"background:#15B8AE\" data-name=\"Teal · Core\"><\u002Fdiv>\n          <div class=\"info\">\n            <div class=\"hex\">#15B8AE<\u002Fdiv>\n            <div class=\"vals\">\n              RGB · 21 184 174<br>\n              CMYK · 79 0 36 4<br>\n              HSL · 176 80% 40%\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"swatch\">\n          <div class=\"chip\" style=\"background:#0E8F88\" data-name=\"Teal · Deep\"><\u002Fdiv>\n          <div class=\"info\">\n            <div class=\"hex\">#0E8F88<\u002Fdiv>\n            <div class=\"vals\">\n              RGB · 14 143 136<br>\n              CMYK · 85 0 41 28<br>\n              HSL · 177 82% 31%\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"swatch dark-chip\">\n          <div class=\"chip\" style=\"background:#070E14\" data-name=\"Ink\"><\u002Fdiv>\n          <div class=\"info\">\n            <div class=\"hex\">#070E14<\u002Fdiv>\n            <div class=\"vals\">\n              RGB · 7 14 20<br>\n              CMYK · 78 50 22 91<br>\n              HSL · 212 48% 5%\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n        <div style=\"background:var(--ink);color:var(--paper);border-radius:14px;padding:32px;\">\n          <h4 style=\"color:var(--teal-light);margin-bottom:12px;\">On dark<\u002Fh4>\n          <p style=\"color:#d6dde6;\">Use ink (<span class=\"mono\">#070E14<\u002Fspan>) as the canonical background. The gradient pops against deep navy and reads as motion at any scale.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper-2);border-radius:14px;padding:32px;\">\n          <h4 style=\"margin-bottom:12px;color:var(--teal-deep);\">On light<\u002Fh4>\n          <p>The gradient holds up on warm off-white. Avoid pure paper-white (#fff) — it cools the brand. Use the cream <span class=\"mono\">#f6f4ef<\u002Fspan> instead.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 06 — TYPOGRAPHY ========== -->\n  <section class=\"page cream\">\n    <div class=\"section-label\"><span class=\"num\">06<\u002Fspan><span>Typography<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">Type<\u002Fdiv>\n      <h2>Montserrat, end to end.<\u002Fh2>\n      <p style=\"margin-top:24px;\">One family does the whole job. The italic black sets the brand voice; the medium and semibold weights carry copy, UI, and tabular data without contrast.<\u002Fp>\n\n      <div class=\"type-display\">Activate.<\u002Fdiv>\n\n      <div class=\"type-grid\">\n        <div class=\"type-card display\">\n          <div class=\"sample\">Aa<\u002Fdiv>\n          <div class=\"specs\"><strong>Montserrat Black Italic<\u002Fstrong><span>900 · italic<\u002Fspan><\u002Fdiv>\n          <p class=\"small\" style=\"margin-top:14px;\">Wordmark, hero, and pull-quote use only. Tight tracking (−2). Never set body copy.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"type-card body\">\n          <div class=\"sample\">Aa<\u002Fdiv>\n          <div class=\"specs\"><strong>Montserrat SemiBold<\u002Fstrong><span>600 · upright<\u002Fspan><\u002Fdiv>\n          <p class=\"small\" style=\"margin-top:14px;\">Section headings, labels, navigation, button text. Wide tracking (+2 to +4) at small sizes.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"type-scale\">\n        <h4 style=\"color:var(--teal-light);margin-bottom:12px;\">Scale<\u002Fh4>\n        <div class=\"scale-row\">\n          <div class=\"sz\">132 / 0.9<\u002Fdiv>\n          <div class=\"scl-sample\" style=\"font-size:84px;font-weight:900;font-style:italic;letter-spacing:-2px;\">Display<\u002Fdiv>\n          <div class=\"use\">Hero · cover<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scale-row\">\n          <div class=\"sz\">72 / 1.0<\u002Fdiv>\n          <div class=\"scl-sample\" style=\"font-size:48px;font-weight:900;letter-spacing:-1px;\">Headline<\u002Fdiv>\n          <div class=\"use\">Section H2<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scale-row\">\n          <div class=\"sz\">28 / 1.2<\u002Fdiv>\n          <div class=\"scl-sample\" style=\"font-size:24px;font-weight:700;\">Subhead<\u002Fdiv>\n          <div class=\"use\">Section H3<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scale-row\">\n          <div class=\"sz\">16 / 1.55<\u002Fdiv>\n          <div class=\"scl-sample\" style=\"font-size:16px;font-weight:500;\">Body — the workhorse weight.<\u002Fdiv>\n          <div class=\"use\">Paragraph<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scale-row\">\n          <div class=\"sz\">11 / 1.4<\u002Fdiv>\n          <div class=\"scl-sample\" style=\"font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;\">EYEBROW LABEL<\u002Fdiv>\n          <div class=\"use\">Tag · meta<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== 07 — APPLICATIONS ========== -->\n  <section class=\"page\">\n    <div class=\"section-label\"><span class=\"num\">07<\u002Fspan><span>Applications<\u002Fspan><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"eyebrow\">In the world<\u002Fdiv>\n      <h2>How it shows up.<\u002Fh2>\n      <p style=\"margin-top:24px;\">A few canonical placements. The bolt always leads; the gradient never gets recolored; ink is the canonical background.<\u002Fp>\n\n      <div class=\"apps\">\n        <div class=\"app card\">\n          <div class=\"biz\">\n            <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"On business card\">\n            <div>\n              <div class=\"name\">Your Name<\u002Fdiv>\n              <div class=\"role\">Title · Department<\u002Fdiv>\n              <div class=\"contact\">\n                hello@arctivate.com<br>\n                +1 555 012 3456<br>\n                arctivate.com\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app avatar\">\n          <div class=\"avatar-circle\">\n            <img src=\"3185d2be-39a5-4548-b73a-c2e7930bd107\" alt=\"Avatar\">\n          <\u002Fdiv>\n          <div class=\"alabel\">Avatar · Social<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app tag\">\n          <div class=\"alabel\">Print · One color<\u002Fdiv>\n          <div class=\"tag-art\">\n            <img src=\"ab26b520-e474-444e-8628-83127b3c709e\" alt=\"Stacked print\">\n          <\u002Fdiv>\n          <div class=\"alabel\" style=\"text-align:right;color:var(--muted);\">Stacked lockup<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app social\" style=\"grid-column: span 2;\">\n          <div class=\"alabel\">Header · Banner<\u002Fdiv>\n          <div class=\"social-art\">\n            <img src=\"b3f302d6-a5b9-4cb4-a2a4-7c9b53e9dfe6\" alt=\"Banner\">\n          <\u002Fdiv>\n          <div class=\"alabel\" style=\"align-self:flex-end;color:var(--muted-dark);\">arctivate.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========== FOOTER ========== -->\n  <section class=\"footer\">\n    <div>\n      <div class=\"small\" style=\"letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;\">End of guidelines<\u002Fdiv>\n      <h2>Stay sharp.<\u002Fh2>\n      <a class=\"powered\" href=\"https://www.arcfitnessaustralia.com.au/\" target=\"_blank\" rel=\"noopener\">\n        <span class=\"powered-label\">Powered by<\u002Fspan>\n        <img src=\"49d15e25-f825-4d85-b577-e47af68d8838\" alt=\"ARC fitness\">\n      <\u002Fa>\n    <\u002Fdiv>\n    <div style=\"text-align:right;\">\n      <div class=\"small\" style=\"letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px;\">Arctivate · Brand Guidelines<\u002Fdiv>\n      <div class=\"small\">v1.0 · 2026 · Internal use<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
