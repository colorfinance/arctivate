name: "Build & Deploy Native iOS App"

on:
  push:
    branches: [main]
    paths:
      - "ios-app/**"
  workflow_dispatch:
    inputs:
      destination:
        description: "Deploy target"
        required: true
        default: "testflight"
        type: choice
        options:
          - testflight
          - appstore

env:
  XCODE_PROJECT: ios-app/Arctivate/Arctivate.xcodeproj
  SCHEME: Arctivate
  BUNDLE_ID: com.arctivate.app

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios-app/Arctivate
    timeout-minutes: 45

    steps:
      # ── Checkout ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Select Xcode ─────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      # ── Resolve SPM dependencies ─────────────────
      - name: Resolve Swift Package Manager dependencies
        run: xcodebuild -resolvePackageDependencies -project Arctivate.xcodeproj -scheme Arctivate

      # ── Install Fastlane ─────────────────────────
      - name: Install Fastlane
        run: gem install fastlane --no-document

      # ── Import signing certificate ───────────────
      - name: Import code-signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Install provisioning profile ─────────────
      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Install profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Create App Store Connect API key file ────
      - name: Create App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ./private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o "./private_keys/AuthKey_${API_KEY_ID}.p8"

          cat > ./api_key.json <<APIKEY
          {
            "key_id": "${API_KEY_ID}",
            "issuer_id": "${ISSUER_ID}",
            "key_filepath": "./private_keys/AuthKey_${API_KEY_ID}.p8"
          }
          APIKEY

      # ── Build & Deploy ───────────────────────────
      - name: Build and deploy
        env:
          APP_STORE_CONNECT_API_KEY_PATH: ./api_key.json
        run: |
          LANE="beta"
          if [ "${{ github.event.inputs.destination }}" = "appstore" ]; then
            LANE="release"
          fi
          fastlane $LANE

      # ── Upload IPA artifact ──────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Arctivate.ipa
          path: ios-app/Arctivate/build/Arctivate.ipa

      # ── Cleanup ──────────────────────────────────
      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/build_pp.mobileprovision
          rm -rf ./private_keys
          rm -f ./api_key.json
