name: Build iOS IPA

# Manual trigger only — needs Apple signing material in repo secrets to
# produce a signed IPA / upload to TestFlight.
on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (build, beta, release)'
        required: true
        default: 'beta'
        type: choice
        options: [build, beta, release]

jobs:
  build:
    runs-on: macos-14

    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Xcode toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + offline shell
        run: npm run build && node scripts/build-offline-shell.js

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install --repo-update

      - name: Install Apple certificate and provisioning profile
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Write App Store Connect API key
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 != '' }}
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          echo -n "$ASC_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Run Fastlane (${{ github.event.inputs.lane }})
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
        working-directory: ios/App
        env:
          FASTLANE_DISABLE_COLORS: 1
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: 'true'
        run: |
          if ! command -v fastlane >/dev/null 2>&1; then
            gem install fastlane --no-document
          fi
          fastlane ${{ github.event.inputs.lane }}

      - name: Build unsigned IPA (no certificate available)
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 == '' }}
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload IPA artifact
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: arctivate-ipa
          path: |
            ios/App/build/*.ipa
            ios/App/build/*.dSYM.zip
          retention-days: 90
          if-no-files-found: warn

      - name: Upload unsigned build artifact
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: arctivate-ios-build
          path: ios/App/build/
          retention-days: 14
          if-no-files-found: warn

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8 2>/dev/null || true
