<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body>
<div class="frame">
  <h1 class="headline">Snap a meal — get <span class="accent">macros</span></h1>
  <p class="subline">AI-powered food scanner. No more typing or guessing</p>
  <div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>●●●● 5G ■</span></div>
    <div class="app-header">
      <div class="app-title">Lunch</div>
      <div class="app-points">⚡ 1,240</div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,#0f2525,#0a1a1a);border:1px solid var(--accent);padding:0;overflow:hidden">
      <div style="aspect-ratio:16/10;background:linear-gradient(135deg,#3a2515 0%,#5a3520 40%,#2a1a0a 100%);display:flex;align-items:center;justify-content:center;font-size:8vw">🥗</div>
      <div style="padding:2.5vw">
        <div style="font-size:1.6vw;color:var(--accent);font-weight:700;letter-spacing:0.15em">DETECTED</div>
        <div style="font-size:2.8vw;font-weight:700;margin-top:0.4vw">Chicken & quinoa bowl</div>
        <div class="macro-grid">
          <div class="macro"><div class="num">612</div><div class="name">CALORIES</div></div>
          <div class="macro"><div class="num">48g</div><div class="name">PROTEIN</div></div>
          <div class="macro"><div class="num">62g</div><div class="name">CARBS</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:1.5vw">Today's totals</div>
      <div class="macro-grid">
        <div class="macro"><div class="num">1,847</div><div class="name">/ 2,200 KCAL</div></div>
        <div class="macro"><div class="num">142g</div><div class="name">/ 165g PROT</div></div>
        <div class="macro"><div class="num">184g</div><div class="name">/ 220g CARB</div></div>
      </div>
    </div>
  </div>
  <div class="brand">ARCTIVATE</div>
</div>
</body></html>
